name: Java CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Installs Gradle 8.10.2 on the runner and puts `gradle` on PATH,
      # so the build does NOT need the committed gradle-wrapper.jar.
      # (Zscaler blocks committing/uploading .jar files, so the wrapper
      #  jar is missing from the repo; using an installed Gradle avoids it.)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Run tests
        run: gradle clean test
