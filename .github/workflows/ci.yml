name: Test Environment

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        working-directory: Gradle
        run: gradle wrapper

      - name: Grant execute permission
        working-directory: Gradle
        run: chmod +x gradlew

      - name: Run Integration Tests
        working-directory: Gradle
        run: ./gradlew test --tests "sdet.reporting.W6D4ReportinginsightsTest" --no-configuration-cache

      # Checkout previous gh-pages branch
      - name: Checkout gh-pages branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages

      # Copy previous history (IMPORTANT FOR TRENDS)
      - name: Copy Allure History
        if: always()
        run: |
          mkdir -p Gradle/build/allure-results
          if [ -d "gh-pages/history" ]; then
            cp -R gh-pages/history Gradle/build/allure-results/history
          fi

      # Generate new report
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: Gradle/build/allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history

      # Upload report artifact
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # Deploy to GitHub Pages
      - name: Deploy Allure Report
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: allure-history
          token: ${{ secrets.GITHUB_TOKEN }}